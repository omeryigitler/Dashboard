name: Diagnose Berfin lint

on:
  pull_request:
  push:
    branches:
      - automation/diagnose-berfin-lint

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/berfinakbas?schema=public
    steps:
      - name: Checkout helper repo
        uses: actions/checkout@v4
      - name: Clone target branch
        run: git clone --depth 1 --branch feat/exact-dashboard-integration https://github.com/omeryigitler/berfinakbas.com.git target
      - name: Enable Corepack
        run: corepack enable
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Capture install and lint output
        working-directory: target
        run: |
          set +e
          pnpm install --no-frozen-lockfile > ../install.log 2>&1
          echo $? > ../install-exit-code.txt
          pnpm lint > ../lint.log 2>&1
          echo $? > ../lint-exit-code.txt
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: berfin-lint-diagnostics
          path: |
            install.log
            install-exit-code.txt
            lint.log
            lint-exit-code.txt
            target/src/components/admin/sales-hub
            target/eslint.config.mjs
            target/package.json
          retention-days: 1
